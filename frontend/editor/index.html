<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QuizCast - Editor</title>
<style>
  :root {
    --bg: #1a1a35;
    --panel: #2a2a4a;
    --white: #fcfcfc;
    --dim: #a0a0c0;
    --blue: #4a90e2;
    --gold: #f39c12;
    --red: #e74c3c;
    --green: #2ecc71;
    --line: #404060;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Courier New', Courier, monospace;
    background: var(--bg);
    color: var(--white);
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    padding: 20px;
  }
  header {
    width: 100%;
    max-width: 1000px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .brand {
    font-size: 32px;
    font-weight: 900;
    color: var(--white);
    text-shadow: 2px 2px 0 var(--blue);
    text-transform: uppercase;
  }
  .brand b { color: var(--gold); }
  .brand i { color: var(--red); font-style: normal; }
  
  .container {
    display: flex;
    gap: 20px;
    width: 100%;
    max-width: 1000px;
    flex: 1;
    min-height: 0;
  }
  
  .sidebar {
    width: 300px;
    background: var(--panel);
    border: 4px solid var(--line);
    display: flex;
    flex-direction: column;
  }
  
  .q-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }
  
  .q-item {
    padding: 10px;
    border: 2px solid var(--line);
    margin-bottom: 10px;
    cursor: pointer;
    background: var(--bg);
    color: var(--dim);
    font-size: 14px;
  }
  .q-item:hover { border-color: var(--dim); }
  .q-item.active { border-color: var(--gold); color: var(--white); }
  .q-item .cat { font-size: 10px; color: var(--blue); margin-bottom: 4px; }
  
  .main {
    flex: 1;
    background: var(--panel);
    border: 4px solid var(--line);
    padding: 20px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  
  label {
    display: block;
    color: var(--dim);
    font-size: 12px;
    margin-bottom: 5px;
    margin-top: 15px;
    text-transform: uppercase;
  }
  
  input[type="text"], input[type="number"], select {
    width: 100%;
    background: var(--bg);
    color: var(--white);
    border: 2px solid var(--line);
    padding: 10px;
    font-family: inherit;
    font-size: 16px;
    outline: none;
  }
  input[type="text"]:focus, input[type="number"]:focus, select:focus {
    border-color: var(--blue);
  }
  
  .answers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  
  .btn {
    padding: 12px 20px;
    font-family: inherit;
    font-size: 14px;
    font-weight: bold;
    text-transform: uppercase;
    cursor: pointer;
    border: 3px solid;
    box-shadow: 4px 4px 0 #000;
  }
  .btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #000; }
  
  .btn-blue { background: var(--blue); color: var(--white); border-color: var(--white); }
  .btn-gold { background: var(--gold); color: var(--bg); border-color: var(--white); }
  .btn-red { background: transparent; color: var(--red); border-color: var(--red); }
  .btn-gray { background: transparent; color: var(--dim); border-color: var(--dim); }
  
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 2px dashed var(--line);
  }
  
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--green);
    color: var(--bg);
    padding: 10px 20px;
    font-weight: bold;
    border: 3px solid var(--white);
    box-shadow: 4px 4px 0 #000;
    display: none;
    z-index: 1000;
  }
</style>
</head>
<body>

  <header>
    <div class="brand">Quiz<b>C</b><i>a</i>st <span style="color:var(--dim); font-size:18px;">EDITOR</span></div>
    <div style="display:flex; gap:10px;">
      <a href="/" class="btn btn-gray" style="text-decoration:none;">Zurück</a>
      <button class="btn btn-gold" id="btnSaveServer">Auf Server Speichern</button>
    </div>
  </header>
  
  <div class="container">
    <div class="sidebar">
      <div style="padding: 10px; border-bottom: 4px solid var(--line);">
        <button class="btn btn-blue" style="width:100%;" id="btnAdd">+ Neue Frage</button>
      </div>
      <div class="q-list" id="qList"></div>
    </div>
    
    <div class="main" id="editorMain" style="display:none;">
      <div style="display:flex; justify-content:space-between; align-items:flex-end;">
        <h2 style="color:var(--gold); font-size:18px;">Frage bearbeiten</h2>
        <button class="btn btn-red" id="btnDelete" style="padding: 6px 12px; font-size:12px;">Löschen</button>
      </div>
      
      <label>Kategorie</label>
      <input type="text" id="inpCat">
      
      <label>Frage</label>
      <input type="text" id="inpQ">
      
      <label>Antworten (A, B, C, D)</label>
      <div class="answers-grid">
        <input type="text" id="inpA0" placeholder="Antwort A">
        <input type="text" id="inpA1" placeholder="Antwort B">
        <input type="text" id="inpA2" placeholder="Antwort C">
        <input type="text" id="inpA3" placeholder="Antwort D">
      </div>
      
      <div style="display:flex; gap:20px;">
        <div style="flex:1;">
          <label>Richtige Antwort</label>
          <select id="inpCorrect">
            <option value="0">A</option>
            <option value="1">B</option>
            <option value="2">C</option>
            <option value="3">D</option>
          </select>
        </div>
        <div style="flex:1;">
          <label>Zeitlimit (Sekunden)</label>
          <input type="number" id="inpTime" min="5" max="60" value="15">
        </div>
      </div>
    </div>
  </div>
  
  <div class="toast" id="toast">Gespeichert!</div>

<script>
const $ = id => document.getElementById(id);
let questions = [];
let currentIndex = -1;

// Laden
async function load() {
  try {
    const r = await fetch("/api/questions");
    questions = await r.json();
    renderList();
  } catch (e) {
    alert("Fehler beim Laden!");
  }
}

// Speichern auf Server
$("btnSaveServer").onclick = async () => {
  saveCurrentToMemory(); // Falls noch Änderungen im Formular
  try {
    const r = await fetch("/api/questions", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(questions)
    });
    if (r.ok) {
      showToast();
    } else {
      alert("Fehler beim Speichern auf dem Server.");
    }
  } catch (e) {
    alert("Netzwerkfehler");
  }
};

function renderList() {
  const list = $("qList");
  list.innerHTML = "";
  questions.forEach((q, i) => {
    const div = document.createElement("div");
    div.className = "q-item" + (i === currentIndex ? " active" : "");
    div.innerHTML = `<div class="cat">${q.category || "Unkategorisiert"}</div><div>${q.question || "Neue Frage..."}</div>`;
    div.onclick = () => selectQuestion(i);
    list.appendChild(div);
  });
  if (currentIndex === -1) {
    $("editorMain").style.display = "none";
  }
}

function selectQuestion(idx) {
  saveCurrentToMemory();
  currentIndex = idx;
  const q = questions[idx];
  
  $("inpCat").value = q.category || "";
  $("inpQ").value = q.question || "";
  $("inpA0").value = q.answers[0] || "";
  $("inpA1").value = q.answers[1] || "";
  $("inpA2").value = q.answers[2] || "";
  $("inpA3").value = q.answers[3] || "";
  $("inpCorrect").value = q.correctIndex !== undefined ? q.correctIndex : 0;
  $("inpTime").value = q.timeLimit || 15;
  
  $("editorMain").style.display = "flex";
  renderList(); // Update active class
}

function saveCurrentToMemory() {
  if (currentIndex === -1) return;
  const q = questions[currentIndex];
  q.category = $("inpCat").value;
  q.question = $("inpQ").value;
  q.answers = [
    $("inpA0").value,
    $("inpA1").value,
    $("inpA2").value,
    $("inpA3").value
  ];
  q.correctIndex = parseInt($("inpCorrect").value, 10);
  q.timeLimit = parseInt($("inpTime").value, 10) || 15;
}

// Input Changes sofort in die Liste syncen
["inpCat", "inpQ"].forEach(id => {
  $(id).addEventListener("input", () => {
    saveCurrentToMemory();
    renderList();
  });
});

$("btnAdd").onclick = () => {
  saveCurrentToMemory();
  questions.unshift({
    id: "q_" + Date.now(),
    category: "Neu",
    question: "Neue Frage",
    answers: ["", "", "", ""],
    correctIndex: 0,
    timeLimit: 15
  });
  selectQuestion(0);
};

$("btnDelete").onclick = () => {
  if (confirm("Frage wirklich löschen?")) {
    questions.splice(currentIndex, 1);
    currentIndex = -1;
    renderList();
  }
};

function showToast() {
  const t = $("toast");
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2000);
}

load();
</script>
</body>
</html>
