<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QuizCast</title>
<style>
  :root {
    --bg: #1a1a35;
    --panel: #2a2a4a;
    --white: #fcfcfc;
    --dim: #a0a0c0;
    --blue: #4a90e2;
    --gold: #f39c12;
    --red: #e74c3c;
    --green: #2ecc71;
    --line: #404060;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Courier New', Courier, monospace;
    background: var(--bg);
    color: var(--white);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .brand {
    font-size: 42px;
    font-weight: 900;
    letter-spacing: -2px;
    color: var(--white);
    text-shadow: 3px 3px 0 var(--blue);
    margin-bottom: 50px;
    margin-top: 10vh;
    text-transform: uppercase;
  }
  .brand b { color: var(--gold); }
  .brand i { color: var(--red); font-style: normal; }
  
  .menu {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 100%;
    max-width: 320px;
  }
  
  .btn {
    display: block;
    width: 100%;
    padding: 20px;
    text-align: center;
    background: var(--panel);
    border: 4px solid var(--line);
    color: var(--white);
    font-family: inherit;
    font-size: 18px;
    font-weight: bold;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    box-shadow: 6px 6px 0 #000;
    transition: transform 0.1s;
  }
  
  .btn:active {
    transform: translate(3px, 3px);
    box-shadow: 3px 3px 0 #000;
  }
  
  .btn-host { border-color: var(--gold); color: var(--gold); }
  .btn-player { border-color: var(--blue); color: var(--blue); }
  .btn-editor { border-color: var(--dim); color: var(--dim); }
  
  .footer {
    margin-top: auto;
    font-size: 12px;
    color: var(--dim);
    padding-top: 40px;
  }
</style>
</head>
<body>

  <div class="brand">Quiz<b>C</b><i>a</i>st</div>
  
  <div class="menu">
    <a href="/host/" class="btn btn-host">Neues Spiel (Host)</a>
    <a href="/player/" class="btn btn-player">Mitspielen (Spieler)</a>
    <a href="/editor/" class="btn btn-editor">Fragen bearbeiten</a>
  </div>
  
  <div class="footer">
    Ein Retro-Quiz für den großen Bildschirm.
  </div>

</body>
</html>
