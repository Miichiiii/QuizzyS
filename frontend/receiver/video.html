<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Quizzy - TV Stream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #101828;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      color: white;
    }
    #video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    #error {
      display: none;
      font-size: 24px;
      color: #ff4a4a;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
  <div id="error">Stream nicht gefunden oder Raum-Code fehlt.</div>
  <video id="video" autoplay muted playsinline></video>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const video = document.getElementById('video');
    const errorDiv = document.getElementById('error');

    if (!code) {
      errorDiv.innerText = "Bitte füge ?code=RAUMCODE zur URL hinzu.";
      errorDiv.style.display = "block";
      video.style.display = "none";
    } else {
      const streamUrl = `/hls/${code.toUpperCase()}/stream.m3u8`;
      
      if (Hls.isSupported()) {
        const hls = new Hls({
          // Reduziere Latenz-Puffer
          liveSyncDurationCount: 3,
          liveMaxLatencyDurationCount: 10,
        });
        hls.loadSource(streamUrl);
        hls.attachMedia(video);
        hls.on(Hls.Events.ERROR, function (event, data) {
          if (data.fatal) {
            console.error("HLS Error", data);
            switch (data.type) {
              case Hls.ErrorTypes.NETWORK_ERROR:
                // try to recover network error
                console.log("fatal network error encountered, try to recover");
                hls.startLoad();
                break;
              case Hls.ErrorTypes.MEDIA_ERROR:
                console.log("fatal media error encountered, try to recover");
                hls.recoverMediaError();
                break;
              default:
                // cannot recover
                hls.destroy();
                break;
            }
          }
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Native HLS (Safari etc)
        video.src = streamUrl;
      }
    }
  </script>
</body>
</html>
