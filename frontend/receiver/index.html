<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Quizzy - TV (Zero-Latency)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --bg: #0f141e;
      --card: #1e2638;
      --text: #ffffff;
      --dim: #a0aabf;
      --green: #35d07f;
      --blue: #4a90e2;
      --red: #e53935;
      --gold: #f0c674;
    }
    body, html {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: radial-gradient(circle, var(--card) 0%, var(--bg) 100%);
      color: var(--text);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #topBar {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 24px;
      font-weight: bold;
    }
    #centerArea {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      text-align: center;
    }
    
    .view { display: none; width: 100%; max-width: 1200px; }
    .view.active { display: block; }
    
    /* Lobby */
    .lobby-title { font-size: 64px; margin-bottom: 20px; }
    .lobby-url { font-size: 40px; color: var(--dim); margin-bottom: 40px; }
    
    /* Question */
    .question-text { font-size: 48px; margin-bottom: 60px; }
    .answers-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }
    .answer-card {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 30px;
      font-size: 36px;
      display: flex;
      align-items: center;
      text-align: left;
      transition: all 0.3s;
    }
    .answer-letter {
      font-weight: bold;
      font-size: 48px;
      opacity: 0.3;
      margin-right: 30px;
      width: 50px;
    }
    .answer-card.correct {
      background: var(--green);
      box-shadow: 0 0 30px var(--green);
      transform: scale(1.05);
    }
    .answer-card.dimmed {
      opacity: 0.3;
    }
    
    /* Ranking */
    .rank-row {
      display: flex;
      justify-content: space-between;
      font-size: 36px;
      margin-bottom: 15px;
      padding: 15px 30px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
    }
    .rank-row:first-child {
      color: var(--green);
      font-weight: bold;
      font-size: 48px;
      background: rgba(53, 208, 127, 0.1);
    }
    
  </style>
</head>
<body>
  <div id="topBar">
    <div id="roomInfo">QUIZZY</div>
    <div id="centerInfo" style="color: var(--gold);"></div>
    <div id="statsInfo"></div>
  </div>
  
  <div id="centerArea">
    <!-- LOBBY -->
    <div id="viewLobby" class="view">
      <div class="lobby-title">Willkommen in der Lobby!</div>
      <div class="lobby-url" id="lobbyUrl"></div>
      <div style="font-size: 36px; color: var(--green);">Warte auf den Host...</div>
    </div>
    
    <!-- QUESTION / REVEAL -->
    <div id="viewQuestion" class="view">
      <div class="question-text" id="qText"></div>
      <div class="answers-grid" id="qAnswers"></div>
    </div>
    
    <!-- FINISHED -->
    <div id="viewFinished" class="view">
      <div style="font-size: 64px; color: var(--gold); margin-bottom: 40px;">ENDSTAND</div>
      <div id="rankingList"></div>
    </div>
  </div>

  <script>
    const socket = io();
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    
    const views = {
      LOBBY: document.getElementById('viewLobby'),
      QUESTION: document.getElementById('viewQuestion'),
      FINISHED: document.getElementById('viewFinished')
    };
    
    let timerInterval = null;

    function showView(name) {
      Object.values(views).forEach(v => v.classList.remove('active'));
      if (views[name]) views[name].classList.add('active');
    }

    if (code) {
      document.getElementById('roomInfo').innerText = `QUIZZY • RAUM ${code.toUpperCase()}`;
      socket.emit('join_as_spectator', { code: code.toUpperCase() });
    } else {
      document.getElementById('centerInfo').innerText = "Bitte ?code=... zur URL hinzufügen";
    }

    socket.on('tv_state', state => {
      if (state.view === 'LOBBY') {
        showView('LOBBY');
        document.getElementById('lobbyUrl').innerText = `Handy: ${state.joinUrl}`;
        document.getElementById('statsInfo').innerText = `Spieler: ${state.playerCount}`;
        document.getElementById('centerInfo').innerText = '';
      }
    });

    socket.on('tv_lobby', data => {
      showView('LOBBY');
      document.getElementById('lobbyUrl').innerText = `Handy: ${data.joinUrl}`;
      document.getElementById('statsInfo').innerText = `Spieler: ${data.playerCount}`;
      document.getElementById('centerInfo').innerText = '';
    });

    socket.on('tv_question', data => {
      showView('QUESTION');
      document.getElementById('qText').innerText = data.question.question;
      document.getElementById('statsInfo').innerText = `Antworten: 0 / ${data.playerCount}`;
      
      const grid = document.getElementById('qAnswers');
      grid.innerHTML = '';
      const letters = ['A', 'B', 'C', 'D'];
      const colors = ['var(--red)', 'var(--blue)', 'var(--gold)', 'var(--green)'];
      
      data.question.answers.forEach((ans, i) => {
        const div = document.createElement('div');
        div.className = 'answer-card';
        div.id = 'ans-' + i;
        div.style.borderLeft = `10px solid ${colors[i]}`;
        div.innerHTML = `<div class="answer-letter">${letters[i]}</div><div>${ans}</div>`;
        grid.appendChild(div);
      });
      
      // Timer
      if (timerInterval) clearInterval(timerInterval);
      const updateTimer = () => {
        const left = Math.max(0, Math.ceil((data.endsAt - Date.now()) / 1000));
        document.getElementById('centerInfo').innerText = `Noch ${left}s`;
        if (left <= 0) clearInterval(timerInterval);
      };
      updateTimer();
      timerInterval = setInterval(updateTimer, 500);
    });

    socket.on('tv_answers', data => {
      document.getElementById('statsInfo').innerText = `Antworten: ${data.answerCount} / ${data.playerCount}`;
    });

    socket.on('tv_reveal', data => {
      if (timerInterval) clearInterval(timerInterval);
      document.getElementById('centerInfo').innerText = "AUFLÖSUNG";
      
      const cards = document.querySelectorAll('.answer-card');
      cards.forEach((card, i) => {
        if (i === data.correctIndex) {
          card.classList.add('correct');
        } else {
          card.classList.add('dimmed');
        }
      });
    });

    socket.on('tv_finished', data => {
      if (timerInterval) clearInterval(timerInterval);
      showView('FINISHED');
      document.getElementById('centerInfo').innerText = "ENDE";
      document.getElementById('statsInfo').innerText = "";
      
      const list = document.getElementById('rankingList');
      list.innerHTML = '';
      data.ranking.slice(0, 5).forEach((r, i) => {
        const row = document.createElement('div');
        row.className = 'rank-row';
        row.innerHTML = `<span>${i+1}. ${r.name}</span><span>${r.score}</span>`;
        list.appendChild(row);
      });
    });
  </script>
</body>
</html>
