<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QuizStream — Video-Stream</title>
<style>
  body { margin: 0; background: #000; height: 100vh; display: flex; }
  video { width: 100%; height: 100%; object-fit: contain; }
  #msg { color: #8ea0bd; font-family: system-ui, sans-serif; margin: auto; text-align: center; }
</style>
</head>
<body>
<video id="v" autoplay muted playsinline controls></video>
<div id="msg" style="display:none"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.13/hls.min.js"></script>
<script>
  // Spielt den echten HLS-Stream im Browser ab (Debug + Tab-Cast des Videos).
  var video = document.getElementById('v');
  var src = '/hls/stream.m3u8';
  if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = src; // Safari nativ
  } else if (window.Hls && Hls.isSupported()) {
    var hls = new Hls({ liveSyncDurationCount: 2 });
    hls.loadSource(src);
    hls.attachMedia(video);
  } else {
    video.style.display = 'none';
    var m = document.getElementById('msg');
    m.style.display = 'block';
    m.textContent = 'Dieser Browser kann kein HLS abspielen.';
  }
</script>
</body>
</html>
